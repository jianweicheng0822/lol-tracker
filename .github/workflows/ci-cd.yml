name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - run: chmod +x mvnw
      - run: ./mvnw clean verify

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: backend/target/site/jacoco/jacoco.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  deploy:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [frontend-ci, backend-ci]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/lol-tracker:latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/lol-tracker:latest
          RIOT_KEY: ${{ secrets.RIOT_API_KEY }}
          OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE,RIOT_KEY,OPENAI_KEY,GH_TOKEN,GH_ACTOR,DB_NAME,DB_USER,DB_PASSWORD,JWT_SECRET,REDIS_PASSWORD,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,STRIPE_PRICE_ID
          script: |
            set -e

            # --- Login & pull new image ---
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            docker pull "$IMAGE"

            # --- Create network if not exists ---
            docker network inspect lol-net >/dev/null 2>&1 || docker network create lol-net

            # --- Start PostgreSQL if not already running ---
            if ! docker ps --format '{{.Names}}' | grep -q '^lol-db$'; then
              docker rm -f lol-db 2>/dev/null || true
              docker run -d \
                --name lol-db \
                --network lol-net \
                --restart unless-stopped \
                -e POSTGRES_DB="${DB_NAME:-lol_tracker}" \
                -e POSTGRES_USER="${DB_USER:-postgres}" \
                -e POSTGRES_PASSWORD="${DB_PASSWORD}" \
                -v pgdata:/var/lib/postgresql/data \
                postgres:16-alpine
              # Wait for PostgreSQL to be ready
              echo "Waiting for PostgreSQL..."
              for i in $(seq 1 30); do
                docker exec lol-db pg_isready -U "${DB_USER:-postgres}" >/dev/null 2>&1 && break
                sleep 1
              done
            fi

            # --- Start Redis if not already running ---
            if ! docker ps --format '{{.Names}}' | grep -q '^lol-redis$'; then
              docker rm -f lol-redis 2>/dev/null || true
              docker run -d \
                --name lol-redis \
                --network lol-net \
                --restart unless-stopped \
                redis:7-alpine \
                redis-server --requirepass "$REDIS_PASSWORD"
              echo "Waiting for Redis..."
              for i in $(seq 1 15); do
                docker exec lol-redis redis-cli -a "$REDIS_PASSWORD" ping >/dev/null 2>&1 && break
                sleep 1
              done
            fi

            # --- Stop docker-compose if running (migration from old setup) ---
            cd /home/ec2-user/lol-tracker 2>/dev/null && docker compose down 2>/dev/null || true
            cd /home/ec2-user

            # --- Stop & remove old containers ---
            docker stop lol-tracker 2>/dev/null || true
            docker rm lol-tracker 2>/dev/null || true
            docker stop lol-nginx 2>/dev/null || true
            docker rm lol-nginx 2>/dev/null || true
            # Stop host nginx if running (legacy from manual deploy)
            sudo systemctl stop nginx 2>/dev/null || true
            # Clean up anything else on port 80
            PORT_CID=$(docker ps -q --filter publish=80)
            [ -n "$PORT_CID" ] && docker stop "$PORT_CID" && docker rm "$PORT_CID" || true

            # --- Start new app container (internal only, no host port) ---
            docker run -d \
              --name lol-tracker \
              --network lol-net \
              --restart unless-stopped \
              -e "RIOT_API_KEY=$RIOT_KEY" \
              -e "OPENAI_API_KEY=$OPENAI_KEY" \
              -e "DB_HOST=lol-db" \
              -e "DB_PORT=5432" \
              -e "DB_NAME=${DB_NAME:-lol_tracker}" \
              -e "DB_USER=${DB_USER:-postgres}" \
              -e "DB_PASSWORD=$DB_PASSWORD" \
              -e "REDIS_HOST=lol-redis" \
              -e "REDIS_PASSWORD=$REDIS_PASSWORD" \
              -e "JWT_SECRET=$JWT_SECRET" \
              -e "CORS_ORIGIN=https://loltracker.lol" \
              -e "STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY" \
              -e "STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET" \
              -e "STRIPE_PRICE_ID=$STRIPE_PRICE_ID" \
              -e "APP_BASE_URL=https://loltracker.lol" \
              "$IMAGE"

            # --- Write Nginx config ---
            rm -rf /tmp/lol-nginx
            mkdir -p /tmp/lol-nginx
            cat > /tmp/lol-nginx/default.conf << 'NGINX'
            server {
                listen 80 default_server;
                server_name _;
                return 301 https://loltracker.lol$request_uri;
            }

            server {
                listen 80;
                server_name loltracker.lol;

                add_header X-Content-Type-Options "nosniff" always;
                add_header X-Frame-Options "DENY" always;
                add_header Referrer-Policy "strict-origin-when-cross-origin" always;
                add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
                add_header Content-Security-Policy "default-src 'self'; img-src 'self' https://ddragon.leagueoflegends.com https://raw.communitydragon.org; style-src 'self' 'unsafe-inline'; connect-src 'self'; font-src 'self'" always;

                location / {
                    proxy_pass http://lol-tracker:8080;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
            }
            NGINX

            # --- Start Nginx reverse proxy ---
            docker run -d \
              --name lol-nginx \
              --network lol-net \
              --restart unless-stopped \
              -p 80:80 \
              -v /tmp/lol-nginx/default.conf:/etc/nginx/conf.d/default.conf:ro \
              nginx:alpine

            # --- Health check: wait for app to start ---
            echo "Waiting for app to start..."
            for i in $(seq 1 60); do
              if curl -sf http://localhost:80/api/tier >/dev/null 2>&1; then
                echo "App is healthy!"
                exit 0
              fi
              sleep 2
            done
            echo "ERROR: App failed to start within 120s"
            docker logs lol-tracker --tail 50
            docker logs lol-nginx --tail 20
            exit 1
