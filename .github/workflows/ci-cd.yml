name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - run: chmod +x mvnw
      - run: ./mvnw clean package -DskipTests

  deploy:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [frontend-ci, backend-ci]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/lol-tracker:latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t $IMAGE .

      - name: Push Docker image
        run: docker push $IMAGE

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/lol-tracker:latest
          RIOT_KEY: ${{ secrets.RIOT_API_KEY }}
          OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE,RIOT_KEY,OPENAI_KEY,GH_TOKEN,GH_ACTOR
          script_stop: false
          script: |
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            docker pull "$IMAGE"
            docker stop lol-tracker 2>/dev/null; docker rm lol-tracker 2>/dev/null; true
            PORT_CONTAINER=$(docker ps -q --filter publish=80)
            if [ -n "$PORT_CONTAINER" ]; then docker stop "$PORT_CONTAINER"; docker rm "$PORT_CONTAINER"; fi
            docker run -d --name lol-tracker -p 80:8080 -e "RIOT_API_KEY=$RIOT_KEY" -e "OPENAI_API_KEY=$OPENAI_KEY" --restart unless-stopped "$IMAGE"
