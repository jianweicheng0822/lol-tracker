name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - run: chmod +x mvnw
      - run: ./mvnw clean verify

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: backend/target/site/jacoco/jacoco.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  deploy:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [frontend-ci, backend-ci]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/lol-tracker:latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t $IMAGE .

      - name: Push Docker image
        run: docker push $IMAGE

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/lol-tracker:latest
          RIOT_KEY: ${{ secrets.RIOT_API_KEY }}
          OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE,RIOT_KEY,OPENAI_KEY,GH_TOKEN,GH_ACTOR,DB_NAME,DB_USER,DB_PASSWORD,JWT_SECRET
          script: |
            set -e

            # --- Login & pull new image ---
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            docker pull "$IMAGE"

            # --- Create network if not exists ---
            docker network inspect lol-net >/dev/null 2>&1 || docker network create lol-net

            # --- Start PostgreSQL if not already running ---
            if ! docker ps --format '{{.Names}}' | grep -q '^lol-db$'; then
              docker rm -f lol-db 2>/dev/null || true
              docker run -d \
                --name lol-db \
                --network lol-net \
                --restart unless-stopped \
                -e POSTGRES_DB="${DB_NAME:-lol_tracker}" \
                -e POSTGRES_USER="${DB_USER:-postgres}" \
                -e POSTGRES_PASSWORD="${DB_PASSWORD}" \
                -v pgdata:/var/lib/postgresql/data \
                postgres:16-alpine
              # Wait for PostgreSQL to be ready
              echo "Waiting for PostgreSQL..."
              for i in $(seq 1 30); do
                docker exec lol-db pg_isready -U "${DB_USER:-postgres}" >/dev/null 2>&1 && break
                sleep 1
              done
            fi

            # --- Stop & remove old app container ---
            docker stop lol-tracker 2>/dev/null || true
            docker rm lol-tracker 2>/dev/null || true
            # Clean up anything else on port 80
            PORT_CID=$(docker ps -q --filter publish=80)
            [ -n "$PORT_CID" ] && docker stop "$PORT_CID" && docker rm "$PORT_CID" || true

            # --- Start new app container ---
            docker run -d \
              --name lol-tracker \
              --network lol-net \
              --restart unless-stopped \
              -p 80:8080 \
              -e "RIOT_API_KEY=$RIOT_KEY" \
              -e "OPENAI_API_KEY=$OPENAI_KEY" \
              -e "DB_HOST=lol-db" \
              -e "DB_PORT=5432" \
              -e "DB_NAME=${DB_NAME:-lol_tracker}" \
              -e "DB_USER=${DB_USER:-postgres}" \
              -e "DB_PASSWORD=$DB_PASSWORD" \
              -e "JWT_SECRET=$JWT_SECRET" \
              "$IMAGE"

            # --- Health check: wait for app to start ---
            echo "Waiting for app to start..."
            for i in $(seq 1 60); do
              if curl -sf http://localhost/health >/dev/null 2>&1; then
                echo "App is healthy!"
                exit 0
              fi
              sleep 2
            done
            echo "ERROR: App failed to start within 120s"
            docker logs lol-tracker --tail 50
            exit 1
