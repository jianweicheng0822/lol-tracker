spring.application.name=backend

# =====================================================
# Riot API Key - loaded from environment variable
# Set RIOT_API_KEY in your environment before running
# =====================================================
riot.api.key=${RIOT_API_KEY}

# =====================================================
# Database Configuration (PostgreSQL)
# =====================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:lol_tracker}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway database migrations
spring.flyway.enabled=true

# =====================================================
# CORS - allowed origin for frontend requests
# Defaults to Vite dev server; override via CORS_ORIGIN env var in production
# =====================================================
cors.allowed-origin=${CORS_ORIGIN:http://localhost:5173}

# =====================================================
# OpenAI API Key - loaded from environment variable
# Set OPENAI_API_KEY in your .env before running
# =====================================================
openai.api-key=${OPENAI_API_KEY}

# =====================================================
# JWT Configuration
# =====================================================
jwt.secret=${JWT_SECRET:defaultDevSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm!}
jwt.expiration-ms=86400000
