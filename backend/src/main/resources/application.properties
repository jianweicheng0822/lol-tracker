spring.application.name=backend

# =====================================================
# Riot API Key - loaded from environment variable
# Set RIOT_API_KEY in your environment before running
# =====================================================
riot.api.key=${RIOT_API_KEY}

# =====================================================
# Database Configuration (H2)
# =====================================================
# Store database in a file (data survives restart)
spring.datasource.url=jdbc:h2:file:./data/lol-tracker-db

# Database credentials (default for H2)
spring.datasource.username=sa
spring.datasource.password=

# H2 driver
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 web console (disabled by default; enable with -Dspring.h2.console.enabled=true for local debugging)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# =====================================================
# CORS - allowed origin for frontend requests
# Defaults to Vite dev server; override via CORS_ORIGIN env var in production
# =====================================================
cors.allowed-origin=${CORS_ORIGIN:http://localhost:5173}

# =====================================================
# OpenAI API Key - loaded from environment variable
# Set OPENAI_API_KEY in your .env before running
# =====================================================
openai.api-key=${OPENAI_API_KEY}
