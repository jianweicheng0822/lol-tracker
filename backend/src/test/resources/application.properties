# Minimal test config — no datasource (WebMvcTest doesn't need one;
# integration tests get theirs from Testcontainers DynamicPropertySource)
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=none

jwt.secret=testSecretKeyThatIsAtLeast256BitsLongForHS256AlgorithmInTests!
jwt.expiration-ms=86400000

riot.api.key=test-riot-key
openai.api-key=test-openai-key
cors.allowed-origin=http://localhost:5173
